<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Search Pop-up | Friends & Co</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Roboto+Condensed:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* BRAND GUIDELINES & UTILITIES */
        :root {
            --color-blue: #5e74b1;
            --color-magenta: #ba3f97;
            --color-green: #85c340;
            --color-teal: #00bbd3;
            --color-orange: #f9a41e;
            --color-slate: #7d91a0;
            --font-primary: 'Open Sans', sans-serif;
            --font-display: 'Akzidenz-Grotesk Pro Medium Condensed', 'Roboto Condensed', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-primary);
            color: #555;
            line-height: 1.6;
            background-color: #FAFAFA;
            /* To simulate background context */
            background-image: url('assets/img/FriendsCo_Pattern.jpg');
            background-size: 400px;
        }

        h1,
        h2,
        h3,
        h4,
        h5 {
            font-family: var(--font-display);
            text-transform: uppercase;
            font-weight: 700;
        }

        /* DUMMY BACKGROUND CONTENT */
        .dummy-content {
            padding: 100px 20px;
            text-align: center;
        }

        .dummy-title {
            color: var(--color-magenta);
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        /* 
         * SITE SEARCH MODAL STYLES 
         */

        .search-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(60, 60, 60, 0.85);
            /* Dark overlay */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            /* For demo, normally toggled */
            visibility: visible;
            padding: 20px;
        }

        .search-modal {
            background-color: #ffffff;
            width: 100%;
            max-width: 850px;
            border-radius: 12px;
            padding: 4rem 3rem;
            position: relative;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            animation: modalFadeIn 0.3s ease-out;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Close Button */
        .modal-close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: transparent;
            border: none;
            font-size: 2.2rem;
            color: #222;
            /* Higher contrast */
            cursor: pointer;
            line-height: 1;
            padding: 10px;
            /* Larger touch target for older adults */
            border-radius: 4px;
            transition: color 0.2s, background-color 0.2s;
        }

        .modal-close-btn:hover {
            color: var(--color-magenta);
            background-color: rgba(0, 0, 0, 0.05);
        }

        .modal-close-btn:focus-visible {
            outline: 3px solid var(--color-blue);
        }

        /* typography */
        .search-modal-title {
            color: var(--color-blue);
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
            text-transform: none;
            /* Matches the Camel Case in the mockup */
        }

        .search-modal-subtitle {
            text-align: center;
            font-size: 1.25rem;
            /* Larger for readability */
            color: #333;
            /* Higher contrast */
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Search Form Area */
        .search-form {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 10px;
            margin-bottom: 3rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-input-wrapper {
            position: relative;
            flex-grow: 1;
        }

        .search-input {
            width: 100%;
            padding: 18px 55px 18px 20px;
            font-size: 1.25rem;
            font-family: var(--font-primary);
            color: #222;
            border: 2px solid var(--color-slate);
            /* Higher contrast default border */
            border-radius: 6px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--color-blue);
            box-shadow: 0 0 0 4px rgba(94, 116, 177, 0.2);
            /* Thicker focus ring */
        }

        .clear-input-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.6rem;
            /* Larger clear button */
            color: #666;
            /* Higher contrast */
            cursor: pointer;
            padding: 8px;
            /* Larger touch target */
            border-radius: 50%;
        }

        .clear-input-btn:hover,
        .clear-input-btn:focus-visible {
            color: var(--color-magenta);
            background-color: rgba(0, 0, 0, 0.05);
            outline: none;
        }

        .clear-input-btn:focus-visible {
            box-shadow: 0 0 0 3px var(--color-blue);
        }

        .search-submit-btn {
            background-color: var(--color-blue);
            color: white;
            border: none;
            border-radius: 6px;
            width: 80px;
            /* Wider button */
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.1s;
        }

        .search-submit-btn:hover,
        .search-submit-btn:focus-visible {
            background-color: #4b5d91;
            /* Darker blue */
            outline: none;
        }

        .search-submit-btn:focus-visible {
            box-shadow: 0 0 0 4px rgba(94, 116, 177, 0.4);
        }

        .search-submit-btn:active {
            transform: scale(0.97);
        }

        /* Popular Searches Area */
        .popular-searches {
            text-align: center;
        }

        .popular-title {
            color: var(--color-blue);
            font-size: 0.95rem;
            letter-spacing: 1.5px;
            margin-bottom: 1.2rem;
        }

        .popular-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .popular-links a {
            color: var(--color-blue);
            background-color: #f0f4f8;
            /* Soft blue block background */
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            padding: 10px 20px;
            border-radius: 50px;
            /* Modern Pill shape */
            border: 2px solid transparent;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .popular-links a:hover,
        .popular-links a:focus-visible {
            background-color: var(--color-blue);
            color: white;
            border-color: var(--color-blue);
            transform: translateY(-2px);
            outline: none;
        }

        /* Responsive Adjustments */
        @media (max-width: 600px) {
            .search-modal {
                padding: 3rem 1.5rem;
            }

            .search-form {
                flex-direction: column;
            }

            .search-submit-btn {
                width: 100%;
                padding: 15px;
            }
        }
    </style>
</head>

<body>

    <!-- Background Content solely for Context -->
    <div class="dummy-content">
        <h2 class="dummy-title">SIGN UP FOR AMONG FRIENDS NEWSLETTER</h2>
        <p>Get important updates from Friends & Co in your inbox.</p>
        <button style="margin-top:20px; padding:10px 20px;">Open Search (Simulator)</button>
    </div>

    <!-- SITE SEARCH MODAL -->
    <div class="search-modal-overlay" id="searchModalOverlay">
        <div class="search-modal">
            <!-- Close Button -->
            <button class="modal-close-btn" id="closeSearchModal" aria-label="Close modal">&times;</button>

            <div class="search-modal-content">
                <!-- Headings -->
                <h2 class="search-modal-title">Site search</h2>
                <p class="search-modal-subtitle">Search programs, services, events and resources.</p>

                <!-- Search Form -->
                <form class="search-form" action="#" method="GET" role="search" aria-label="Site search form">
                    <div class="search-input-wrapper">
                        <label for="searchInput"
                            style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;">Search
                            our site</label>
                        <input type="text" class="search-input" id="searchInput" placeholder="Search..." value="test"
                            autocomplete="off">
                        <!-- Tiny visual 'x' to clear like in design -->
                        <button type="button" class="clear-input-btn" id="clearSearchBtn"
                            aria-label="Clear search input">&times;</button>
                    </div>
                    <!-- Submit Button -->
                    <button type="submit" class="search-submit-btn" aria-label="Submit search">
                        <i class="fas fa-search"></i>
                    </button>
                </form>

                <!-- Popular Searches -->
                <div class="popular-searches">
                    <h3 class="popular-title">Popular searches</h3>
                    <div class="popular-links">
                        <a href="#"><i class="fas fa-hand-holding-heart"></i> Friendship Services</a>
                        <a href="#"><i class="fas fa-user-friends"></i> Be a Friend</a>
                        <a href="#"><i class="fas fa-gift"></i> Support Friends & Co</a>
                        <a href="#"><i class="fas fa-info-circle"></i> About</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple JS for demonstration
        const clearBtn = document.getElementById('clearSearchBtn');
        const searchInput = document.getElementById('searchInput');
        const closeModalBtn = document.getElementById('closeSearchModal');
        const modalOverlay = document.getElementById('searchModalOverlay');

        // Clear input logic
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            searchInput.focus();
        });

        // Close modal logic (for demonstration purposes)
        closeModalBtn.addEventListener('click', () => {
            modalOverlay.style.display = 'none';
        });

        // Optional: click outside to close
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.style.display = 'none';
            }
        });
    </script>
</body>

</html>
